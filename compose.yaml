volumes:
  postgres_data:
  mongo_data:
    
services:
  postgres:
    image: postgres:15-alpine
    container_name: user-admin-postgres
    environment:
      POSTGRES_DB: user_admin
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: user-admin-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

rabbitmq:
  image: rabbitmq:3-management
  container_name: user-admin-rabbitmq
  ports:
    - "5672:5672"
    - "15672:15672"

