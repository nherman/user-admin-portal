spring.application.name=user-admin-portal

spring.datasource.url=jdbc:postgresql://localhost:5432/user_admin
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true

spring.mongodb.uri=mongodb://localhost:27017/user_admin

homepage.default.title=User Admin Portal
homepage.default.body=Manage users, roles, and account status from one place.
homepage.default.image-url=/images/homepage.png
